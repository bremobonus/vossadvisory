name: Social Card Audit

on:
  push:
    paths:
      - 'social-card-audit.sh'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Run social card audit on DreamHost
        env:
          SSHPASS: ${{ secrets.DREAMHOST_SSH_PASS }}
        run: |
          sshpass -e ssh \
            -o PreferredAuthentications=password \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=60 \
            dh_yadmw3@pdx1-shared-a2-06.dreamhost.com \
            'bash -s' < social-card-audit.sh

      - name: Report card status
        env:
          SSHPASS: ${{ secrets.DREAMHOST_SSH_PASS }}
        run: |
          sshpass -e ssh \
            -o PreferredAuthentications=password \
            -o StrictHostKeyChecking=no \
            dh_yadmw3@pdx1-shared-a2-06.dreamhost.com \
            'python3 -c "
import json, os, glob
posts, ok, missing = [], [], []
for p in sorted(glob.glob("/home/dh_yadmw3/artonly.io/posts/*.json")):
    with open(p) as f:
        try: d = json.load(f)
        except: continue
    slug = d.get(\"slug\", os.path.basename(p).replace(\".json\",\"\"))
    has_dl = \"[download:\" in d.get(\"body\",\"\")
    card = os.path.exists(f\"/home/dh_yadmw3/artonly.io/assets/images/artists/{slug}-social-9x16.jpg\")
    posts.append(slug)
    (ok if has_dl and card else missing).append(slug)
print(f\"Total: {len(posts)} | OK: {len(ok)} | Missing: {len(missing)}\")
for m in missing: print(f\"  MISSING: {m}\")
"'
