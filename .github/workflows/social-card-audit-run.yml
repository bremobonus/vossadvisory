name: Social Card Audit

on:
  push:
    branches:
      - run-social-card-audit

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Test SSH connectivity
        run: |
          echo "Testing TCP reach to DreamHost port 22..."
          timeout 15 bash -c 'cat < /dev/null > /dev/tcp/pdx1-shared-a2-06.dreamhost.com/22' \
            && echo "Port 22 OPEN" \
            || echo "Port 22 UNREACHABLE - SSH will fail"

      - name: Run social card audit on DreamHost
        run: |
          sshpass -p 'Neverending48!' ssh \
            -o PreferredAuthentications=password \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=120 \
            -o ServerAliveInterval=30 \
            dh_yadmw3@pdx1-shared-a2-06.dreamhost.com \
            'bash -s' < social-card-audit.sh
