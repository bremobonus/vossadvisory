name: Deploy ArtOnly Posts + Generate Social Cards

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Deploy script filename in repo root (e.g. deploy-artonly-2026-05-24.sh)'
        required: true
        default: 'deploy-artonly-2026-05-24.sh'
  push:
    branches:
      - main
    paths:
      - 'deploy-artonly-*.sh'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine deploy script
        id: script
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            SCRIPT=$(git diff --name-only HEAD^ HEAD | grep '^deploy-artonly-.*\.sh$' | tail -1)
            if [ -z "$SCRIPT" ]; then
              SCRIPT=$(ls deploy-artonly-*.sh 2>/dev/null | sort | tail -1)
            fi
          else
            SCRIPT="${{ github.event.inputs.script }}"
          fi
          echo "script=$SCRIPT" >> $GITHUB_OUTPUT
          echo "Deploying: $SCRIPT"

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Verify deploy script exists
        run: |
          if [ ! -f "${{ steps.script.outputs.script }}" ]; then
            echo "ERROR: ${{ steps.script.outputs.script }} not found in repo"
            exit 1
          fi
          echo "Script found: ${{ steps.script.outputs.script }}"

      - name: Run deploy script on DreamHost
        env:
          SSHPASS: ${{ secrets.DREAMHOST_SSH_PASS }}
        run: |
          sshpass -e ssh \
            -o PreferredAuthentications=password \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=60 \
            dh_yadmw3@pdx1-shared-a2-06.dreamhost.com \
            'bash -s' < "${{ steps.script.outputs.script }}"

      - name: Confirm social cards exist on server
        env:
          SSHPASS: ${{ secrets.DREAMHOST_SSH_PASS }}
        run: |
          sshpass -e ssh \
            -o PreferredAuthentications=password \
            -o StrictHostKeyChecking=no \
            dh_yadmw3@pdx1-shared-a2-06.dreamhost.com \
            "python3 -c \"import json,os,glob;D='/home/dh_yadmw3/artonly.io';data=[json.load(open(p)) for p in sorted(glob.glob(D+'/posts/*.json')) if os.path.getsize(p)>2];ok=[d.get('slug','') for d in data if '[download:' in d.get('body','') and os.path.exists(D+'/assets/images/artists/'+d.get('slug','')+'-social-9x16.jpg')];ng=[d.get('slug','') for d in data if '[download:' not in d.get('body','') or not os.path.exists(D+'/assets/images/artists/'+d.get('slug','')+'-social-9x16.jpg')];print(f'Total: {len(data)} | OK: {len(ok)} | Missing: {len(ng)}');[print('  MISSING:',s) for s in ng]\""
